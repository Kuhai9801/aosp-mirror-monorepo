name: CodeQL full submodule scan

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-full-submodules
  cancel-in-progress: true

jobs:
  analyze-no-build:
    name: Analyze Android mirror sources (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language:
          - c-cpp
          - java-kotlin

    steps:
      - name: Checkout mirror with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Expand submodule history
        run: |
          git submodule foreach --recursive '
            git fetch --all --tags --prune || true
            if git rev-parse --is-shallow-repository | grep -qx true; then
              git fetch --unshallow --tags --prune || true
            fi
          '

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  analyze-interpreted:
    name: Analyze Android mirror scripts (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python

    steps:
      - name: Checkout mirror with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Expand submodule history
        run: |
          git submodule foreach --recursive '
            git fetch --all --tags --prune || true
            if git rev-parse --is-shallow-repository | grep -qx true; then
              git fetch --unshallow --tags --prune || true
            fi
          '

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
